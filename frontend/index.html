<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureNote App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🔒 SecureNote</h1>
        
        <div id="errorMessage" class="error-message" style="display: none;"></div>

        <form id="noteForm">
            <input type="password" id="secretToken" placeholder="Enter Secret Token (Required for Post/Delete)" required>
            <input type="text" id="noteTitle" placeholder="Note Title" required>
            <textarea id="noteContent" placeholder="Note Content" rows="4" required></textarea>
            <button type="submit">Add Note</button>
        </form>

        <div class="notes-container">
            <h2>Your Notes</h2>
            <div id="notesList">
                <p>Loading notes...</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
